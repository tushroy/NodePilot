<svg width="520" height="180" viewBox="0 0 520 180" xmlns="http://www.w3.org/2000/svg">

  <!-- Symbol -->
  <g stroke="#000000" fill="none" stroke-width="4">

    <!-- Circular system node -->
    <circle cx="90" cy="90" r="55"/>

    <!-- Isolation barrier -->
    <line x1="90" y1="35" x2="90" y2="145"/>

    <!-- RF waveform -->
    <path d="M55 90 Q72 70 90 90 Q108 110 125 90"
          stroke-linecap="round"/>

    <!-- PCB terminals -->
    <line x1="145" y1="70" x2="170" y2="70"/>
    <circle cx="170" cy="70" r="4" fill="#000000"/>

    <line x1="145" y1="110" x2="185" y2="110"/>
    <circle cx="185" cy="110" r="4" fill="#000000"/>

  </g>

  <!-- Wordmark -->
  <text x="220" y="95"
        font-family="Segoe UI, Arial, sans-serif"
        font-size="48"
        font-weight="600"
        fill="#000000">
    NodePilot
  </text>

  <!-- Signature -->
  <text x="222" y="125"
        font-family="Segoe UI, Arial, sans-serif"
        font-size="14"
        fill="#000000"
        letter-spacing="1">
    by S21TIP
  </text>

</svg>
